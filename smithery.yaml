name: omni-service-node
displayName: "Omni Service Node — AI Agent Data Marketplace"
description: >
  The petrol station for AI agents. 56 pay-per-call endpoints covering every domain
  AI agents need: market signals, macro economics, geopolitical crisis intelligence
  (Iran/Israel/Trump), crypto/DeFi, earnings, insider trades, options flow, SEC/USPTO
  filings, GitHub velocity, company deep dives, sanctions screening, ArXiv research,
  stablecoins, Bittensor, Virtuals Protocol, whale tracking, and more.
  All paid in real USDC on Base Mainnet. No subscriptions — pure per-call pricing.
license: MIT
homepage: https://omni-service-node-production.up.railway.app
repository: https://github.com/Luckkyyy23/omni-service-node
startCommand:
  type: http
  url: https://omni-service-node-production.up.railway.app/mcp
  configSchema:
    type: object
    properties:
      currency:
        type: string
        default: "USD"
        description: "Preferred fiat currency for price outputs (ISO 4217 code)"
        enum: ["USD", "EUR", "GBP", "JPY", "CHF"]
      outputDetail:
        type: string
        default: "standard"
        description: "Level of detail in API responses — compact for minimal data, verbose for full context"
        enum: ["compact", "standard", "verbose"]
      defaultRegion:
        type: string
        default: "global"
        description: "Default geographic focus for macro and geopolitical data (global, us, eu, asia)"
        enum: ["global", "us", "eu", "asia", "latam"]
    additionalProperties: false
